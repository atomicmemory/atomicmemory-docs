            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                description: Aggregate mutation statistics for a user.
                properties:
                  active_versions:
                    type: number
                  by_mutation_type:
                    additionalProperties:
                      type: number
                    type: object
                  superseded_versions:
                    type: number
                  total_claims:
                    type: number
                  total_versions:
                    type: number
                required:
                  - total_versions
                  - active_versions
                  - superseded_versions
                  - total_claims
                  - by_mutation_type
                type: object
          description: Mutation summary.
        "400":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Input validation error
        "500":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Internal server error
      summary: Aggregate mutation statistics for a user's memory store.
      tags:
        - Audit
  /v1/memories/cap:
    get:
      operationId: checkMemoryCap
      parameters:
        - in: query
          name: user_id
          required: true
          schema:
            minLength: 1
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                description: Memory cap status and recommendation.
                properties:
                  active_memories:
                    type: number
                  max_memories:
                    type: number
                  recommendation:
                    enum:
                      - none
                      - consolidate
                      - decay
                      - consolidate-and-decay
                    type: string
                  status:
                    enum:
                      - ok
                      - warn
                      - exceeded
                    type: string
                  usage_ratio:
                    type: number
                required:
                  - active_memories
                  - max_memories
                  - status
                  - usage_ratio
                  - recommendation
                type: object
          description: Cap status.
        "400":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Input validation error
        "500":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Internal server error
      summary: Memory-cap status for a user's store.
      tags:
        - Lifecycle
  /v1/memories/config:
    put:
      description: Set CORE_RUNTIME_CONFIG_MUTATION_ENABLED=true to enable. Startup-only fields (embedding_provider/model, voyage_api_key, voyage_document_model, voyage_query_model, llm_provider/model) return 400 with a `rejected` array listing the offending fields.
      operationId: updateConfig
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: {}
              description: Runtime config mutation. See handler for 410 and rejected[] paths.
              properties: {}
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                description: Applied config updates + full post-update snapshot.
                properties:
                  applied:
                    items:
                      type: string
                    type: array
                  config:
                    description: Runtime config snapshot returned by /health + /config.
                    properties:
                      agentic_retrieval_enabled:
                        type: boolean
                      clarification_conflict_threshold:
                        type: number
                      cross_encoder_enabled:
                        type: boolean
                      embedding_model:
                        type: string
                      embedding_provider:
                        type: string
                      entity_graph_enabled:
                        type: boolean
                      hybrid_search_enabled:
                        type: boolean
                      iterative_retrieval_enabled:
                        type: boolean
                      llm_model:
                        type: string
                      llm_provider:
                        type: string
                      max_search_results:
                        type: number
                      repair_loop_enabled:
                        type: boolean
                      retrieval_profile:
                        type: string
                      voyage_document_model:
                        type: string
                      voyage_query_model:
                        type: string
                    required:
                      - retrieval_profile
                      - embedding_provider
                      - embedding_model
                      - voyage_document_model
                      - voyage_query_model
                      - llm_provider
                      - llm_model
                      - clarification_conflict_threshold
                      - max_search_results
                      - hybrid_search_enabled
                      - iterative_retrieval_enabled
                      - entity_graph_enabled
                      - cross_encoder_enabled
                      - agentic_retrieval_enabled
                      - repair_loop_enabled
                    type: object
                  note:
                    type: string
                required:
                  - applied
                  - config
                  - note
                type: object
          description: Applied changes + config snapshot.
        "400":
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ErrorBasic"
                  - $ref: "#/components/schemas/ErrorConfig400"
          description: Input validation error OR startup-only fields were supplied.
        "410":
          content:
            application/json:
              schema:
                description: 410 Gone envelope for PUT /v1/memories/config when runtime mutation is disabled.
                example:
                  detail: Set CORE_RUNTIME_CONFIG_MUTATION_ENABLED=true to enable runtime mutation in dev/test environments.
                  error: PUT /v1/memories/config is deprecated for production
                properties:
                  detail:
                    type: string
                  error:
                    type: string
                required:
                  - error
                  - detail
                type: object
          description: Runtime config mutation is disabled in production.
        "500":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Internal server error
      summary: Mutate runtime config (dev/test only). 410 when disabled.
      tags:
        - Configuration
  /v1/memories/consolidate:
    post:
      operationId: consolidateMemories
      requestBody:
        content:
          application/json:
            schema:
              properties:
                execute:
                  type: boolean
                user_id:
                  description: Required. user_id.
                  minLength: 1
                  type: string
              required:
                - user_id
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                anyOf:
                  - description: Consolidation dry-run (execute=false).
                    properties:
                      clusters:
                        items:
                          properties:
                            avg_affinity:
                              type: number
                            member_contents:
                              items:
                                type: string
                              type: array
                            member_count:
                              type: number
                            member_ids:
                              items:
                                type: string
                              type: array
                          required:
                            - member_ids
                            - member_contents
                            - avg_affinity
                            - member_count
                          type: object
                        type: array
                      clusters_found:
                        type: number
                      memories_in_clusters:
                        type: number
                      memories_scanned:
                        type: number
                    required:
                      - memories_scanned
                      - clusters_found
                      - memories_in_clusters
                      - clusters
                    type: object
                  - description: Consolidation execution result (execute=true).
                    properties:
                      clusters_consolidated:
                        type: number
                      consolidated_memory_ids:
                        items:
                          type: string
                        type: array
                      memories_archived:
                        type: number
                      memories_created:
                        type: number
                    required:
                      - clusters_consolidated
                      - memories_archived
                      - memories_created
                      - consolidated_memory_ids
                    type: object
                description: Consolidation result — scan or execute.
          description: Consolidation result.
        "400":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Input validation error
        "500":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Internal server error
      summary: Compute consolidation candidates; optionally execute (execute=true).
      tags:
        - Lifecycle
  /v1/memories/decay:
    post:
      operationId: evaluateDecay
      requestBody:
        content:
          application/json:
            schema:
              properties:
                dry_run:
                  type: boolean
                user_id:
                  description: Required. user_id.
                  minLength: 1
                  type: string
              required:
                - user_id
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                description: Decay evaluation (+ archive count when not dry-run).
                properties:
                  archived:
                    type: number
                  avg_retention_score:
                    type: number
                  candidates_for_archival:
                    items:
                      properties:
                        access_count:
                          type: number
                        content:
                          type: string
                        days_since_access:
                          type: number
                        id:
                          type: string
                        importance:
                          type: number
                        retention_score:
                          type: number
                      required:
                        - id
                        - content
                        - retention_score
                        - importance
                        - days_since_access
                        - access_count
                      type: object
                    type: array
                  memories_evaluated:
                    type: number
                  retention_threshold:
                    type: number
                required:
                  - memories_evaluated
                  - candidates_for_archival
                  - retention_threshold
                  - avg_retention_score
                  - archived
                type: object
          description: Decay evaluation + archived count.
        "400":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Input validation error
        "500":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Internal server error
      summary: Evaluate decay candidates. dry_run=false archives them.
      tags:
        - Lifecycle
  /v1/memories/expand:
    post:
      operationId: expandMemories
      requestBody:
        content:
          application/json:
            schema:
              description: Expand a list of memory IDs into full objects.
              properties:
                agent_id:
                  description: Optional agent identifier. Silently dropped if empty / non-string.
                  type: string
                memory_ids:
                  description: Required. memory_ids.
                  items:
                    type: string
                  type: array
                user_id:
                  description: Required. user_id.
                  minLength: 1
