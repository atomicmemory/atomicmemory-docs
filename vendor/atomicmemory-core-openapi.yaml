          description: Input validation error
        "500":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Internal server error
      summary: Auto-resolve all expired conflicts for a user.
      tags:
        - Agents
  /v1/agents/conflicts/{id}/resolve:
    put:
      operationId: resolveAgentConflict
      parameters:
        - in: path
          name: id
          required: true
          schema:
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              description: Resolve a specific conflict with one of the three enum variants.
              properties:
                resolution:
                  enum:
                    - resolved_new
                    - resolved_existing
                    - resolved_both
                  type: string
              required:
                - resolution
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                description: Resolved-conflict echo.
                properties:
                  id:
                    type: string
                  status:
                    enum:
                      - resolved_new
                      - resolved_existing
                      - resolved_both
                    type: string
                required:
                  - id
                  - status
                type: object
          description: Resolution confirmation.
        "400":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Input validation error
        "500":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Internal server error
      summary: Resolve a specific conflict with one of the three enum variants.
      tags:
        - Agents
  /v1/agents/trust:
    get:
      operationId: getAgentTrust
      parameters:
        - description: Required. agent_id.
          in: query
          name: agent_id
          required: true
          schema:
            description: Required. agent_id.
            minLength: 1
            type: string
        - description: Required. user_id.
          in: query
          name: user_id
          required: true
          schema:
            description: Required. user_id.
            minLength: 1
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                description: (userId, agentId) trust record.
                properties:
                  agent_id:
                    type: string
                  trust_level:
                    type: number
                required:
                  - agent_id
                  - trust_level
                type: object
          description: Agent id + trust level.
        "400":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Input validation error
        "500":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Internal server error
      summary: Look up the trust level for a (user, agent) pair.
      tags:
        - Agents
    put:
      operationId: setAgentTrust
      requestBody:
        content:
          application/json:
            schema:
              description: Set the calling user's trust level for a given agent. trust_level in [0.0, 1.0].
              properties:
                agent_id:
                  description: Required. agent_id.
                  minLength: 1
                  type: string
                display_name:
                  type: string
                trust_level:
                  description: Trust score in [0.0, 1.0].
                  maximum: 1
                  minimum: 0
                  type: number
                user_id:
                  description: Required. user_id.
                  minLength: 1
                  type: string
              required:
                - agent_id
                - user_id
                - trust_level
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                description: (userId, agentId) trust record.
                properties:
                  agent_id:
                    type: string
                  trust_level:
                    type: number
                required:
                  - agent_id
                  - trust_level
                type: object
          description: Agent id + applied trust level.
        "400":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Input validation error
        "500":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Internal server error
      summary: Set the calling user's trust level for a given agent.
      tags:
        - Agents
  /v1/memories/audit/recent:
    get:
      operationId: getRecentAudit
      parameters:
        - in: query
          name: user_id
          required: true
          schema:
            minLength: 1
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                description: Newest-first mutation rows for a user.
                properties:
                  count:
                    type: number
                  mutations:
                    items:
                      additionalProperties: {}
                      description: Claim-version row (one snapshot in a memory's history).
                      properties:
                        actor_model:
                          type:
                            - string
                            - "null"
                        claim_id:
                          type: string
                        content:
                          type: string
                        contradiction_confidence:
                          type:
                            - number
                            - "null"
                        created_at:
                          type: string
                        embedding:
                          items:
                            type: number
                          type: array
                        episode_id:
                          type:
                            - string
                            - "null"
                        id:
                          type: string
                        importance:
                          type: number
                        memory_id:
                          type:
                            - string
                            - "null"
                        mutation_reason:
                          type:
                            - string
                            - "null"
                        mutation_type:
                          enum:
                            - add
                            - update
                            - supersede
                            - delete
                            - clarify
                            - null
                          type:
                            - string
                            - "null"
                        previous_version_id:
                          type:
                            - string
                            - "null"
                        source_site:
                          type: string
                        source_url:
                          type: string
                        superseded_by_version_id:
                          type:
                            - string
                            - "null"
                        user_id:
                          type: string
                        valid_from:
                          type: string
                        valid_to:
                          type:
                            - string
                            - "null"
                      required:
                        - id
                        - claim_id
                        - user_id
                        - content
                        - embedding
                        - importance
                        - source_site
                        - source_url
                        - valid_from
                        - created_at
                      type: object
                    type: array
                required:
                  - mutations
                  - count
                type: object
          description: Recent mutations.
        "400":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Input validation error
        "500":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
