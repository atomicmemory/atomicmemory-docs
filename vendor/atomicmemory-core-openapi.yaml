    post:
      operationId: autoResolveAgentConflicts
      requestBody:
        content:
          application/json:
            schema:
              description: Auto-resolve expired conflicts for a user.
              properties:
                user_id:
                  description: Required. user_id.
                  minLength: 1
                  type: string
