components:
  parameters: {}
  schemas:
    ErrorBasic:
      description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
      example:
        error: user_id is required
      properties:
        error:
          type: string
      required:
        - error
      type: object
    ErrorConfig400:
      description: Richer 400 envelope for PUT /v1/memories/config when startup-only fields are included.
      example:
        detail: Fields embedding_provider cannot be mutated at runtime — the embedding/LLM provider caches are fixed at first use.
        error: Provider/model selection is startup-only
        rejected:
          - embedding_provider
      properties:
        detail:
          type: string
        error:
          type: string
        rejected:
          items:
            type: string
          type: array
      required:
        - error
        - detail
        - rejected
      type: object
    ErrorConfig410:
      description: 410 Gone envelope for PUT /v1/memories/config when runtime mutation is disabled.
      example:
        detail: Set CORE_RUNTIME_CONFIG_MUTATION_ENABLED=true to enable runtime mutation in dev/test environments.
        error: PUT /v1/memories/config is deprecated for production
      properties:
        detail:
          type: string
        error:
          type: string
      required:
        - error
        - detail
      type: object
info:
  description: Semantic memory engine for AI applications. Request/response bodies are JSON; fields on the wire use snake_case.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: AtomicMemory HTTP API
  version: 1.0.0
openapi: 3.1.0
paths:
  /v1/agents/conflicts:
    get:
      operationId: listAgentConflicts
      parameters:
        - description: Required. user_id.
          in: query
          name: user_id
          required: true
          schema:
            description: Required. user_id.
            minLength: 1
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                description: Open agent-trust conflicts for a user.
                properties:
                  conflicts:
                    items:
                      additionalProperties: {}
                      description: Memory conflict row from the repository.
                      properties:
                        auto_resolve_after:
                          type:
                            - string
                            - "null"
                        clarification_note:
                          type:
                            - string
                            - "null"
                        contradiction_confidence:
                          type: number
                        created_at:
                          type: string
                        existing_agent_id:
                          type:
                            - string
                            - "null"
                        existing_memory_id:
                          type:
                            - string
                            - "null"
                        existing_trust_level:
                          type:
                            - number
                            - "null"
                        id:
                          type: string
                        new_agent_id:
                          type:
                            - string
                            - "null"
                        new_memory_id:
                          type:
                            - string
                            - "null"
                        new_trust_level:
                          type:
                            - number
                            - "null"
                        resolution_policy:
                          type:
                            - string
                            - "null"
                        resolved_at:
                          type:
                            - string
                            - "null"
                        status:
                          enum:
                            - open
                            - resolved_new
                            - resolved_existing
                            - resolved_both
                            - auto_resolved
                          type: string
                        user_id:
                          type: string
                      required:
                        - id
                        - user_id
                        - new_memory_id
                        - existing_memory_id
                        - new_agent_id
                        - existing_agent_id
                        - new_trust_level
                        - existing_trust_level
                        - contradiction_confidence
                        - clarification_note
                        - status
                        - resolution_policy
                        - resolved_at
                        - created_at
                        - auto_resolve_after
                      type: object
                    type: array
                  count:
                    type: number
                required:
                  - conflicts
                  - count
                type: object
          description: Conflicts list.
        "400":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Input validation error
        "500":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Internal server error
      summary: List open agent conflicts for a user.
      tags:
        - Agents
